server.port=8080
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:80}

# JPA / H2 in PostgreSQL-compatibility mode (default dev profile)
spring.datasource.url=jdbc:h2:mem:dictee;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=true

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
