services:
  # Backend — Spring Boot (Docker)
  - type: web
    name: dictee-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ALLOWED_ORIGINS
        value: https://dictee-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: dictee-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: dictee-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: dictee-db
          property: password

  # Frontend — React/Vite (site statique)
  - type: web
    name: dictee-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    envVars:
      - key: VITE_API_URL
        value: https://dictee-backend.onrender.com

databases:
  - name: dictee-db
    plan: free
